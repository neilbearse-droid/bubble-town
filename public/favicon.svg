<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8FD0FF"/>
      <stop offset="1" stop-color="#CDEBFF"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background so the icon is safe as a maskable too -->
  <rect width="512" height="512" fill="url(#sky)"/>
  <!-- sun -->
  <circle cx="404" cy="116" r="42" fill="#FFD166"/>
  <!-- rolling hill -->
  <path d="M0 372 Q170 312 320 360 Q420 392 512 356 L512 512 L0 512 Z" fill="#6FE7B7"/>
  <!-- house body -->
  <rect x="168" y="276" width="176" height="150" rx="16" fill="#FFF1D6" stroke="#241B3C" stroke-width="10"/>
  <!-- roof -->
  <path d="M150 286 L256 196 L362 286 Z" fill="#FF6FB5" stroke="#241B3C" stroke-width="10" stroke-linejoin="round"/>
  <!-- door -->
  <rect x="238" y="344" width="58" height="82" rx="22" fill="#A24BFF" stroke="#241B3C" stroke-width="9"/>
  <circle cx="284" cy="388" r="6" fill="#FFD166"/>
  <!-- window -->
  <rect x="190" y="300" width="44" height="44" rx="10" fill="#2FE6F6" stroke="#241B3C" stroke-width="8"/>
  <!-- sparkle -->
  <path d="M120 196 l9 22 22 9 -22 9 -9 22 -9 -22 -22 -9 22 -9 z" fill="#FFFFFF"/>
</svg>
